const LS = {
  get:(k,def)=>{ try{const v=localStorage.getItem(AF_PREFIX+k);return v?JSON.parse(v):def;}catch{return def;} },
  set:(k,v)=>{ try{localStorage.setItem(AF_PREFIX+k,JSON.stringify(v));}catch{} },
};

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function saveResult(subject, mode, score, total, breakdown) {
  const all = LS.get('results',[]);
  all.push({ iso:new Date().toISOString(), date:new Date().toLocaleDateString('en-SG',{day:'numeric',month:'short'}), subject, mode, score, total, pct:Math.round((score/total)*100), breakdown });
  LS.set('results', all);
}
function getResults(){ return LS.get('results',[]); }

function subjectStats(sub) {
  const rs = getResults().filter(r=>r.subject===sub);
  if (!rs.length) return null;
  const avg = Math.round(rs.reduce((a,b)=>a+b.pct,0)/rs.length);
  const best = Math.max(...rs.map(r=>r.pct));
  const quizRs = rs.filter(r=>r.mode==='quiz');
  const drillRs = rs.filter(r=>r.mode==='drill');
  const quizAvg = quizRs.length ? Math.round(quizRs.reduce((a,b)=>a+b.pct,0)/quizRs.length) : null;
  const drillAvg = drillRs.length ? Math.round(drillRs.reduce((a,b)=>a+b.pct,0)/drillRs.length) : null;
  const perfectDrills = rs.filter(r=>r.mode==='drill'&&r.pct===100).length;
  return { avg, best, count:rs.length, perfectDrills, quizAvg, drillAvg };
}

function Confetti() {
  const pieces = Array.from({length:30},(_,i)=>({ id:i, left:Math.random()*100, delay:Math.random()*1.2, color:['#f59e0b','#3b82f6','#10b981','#ec4899','#a855f7','#f97316'][i%6], size:8+Math.random()*8 }));
  return <>{pieces.map(p=><div key={p.id} className="confetti-piece" style={{left:`${p.left}%`,top:'-20px',background:p.color,width:`${p.size}px`,height:`${p.size}px`,animationDelay:`${p.delay}s`}} />)}</>;
}

            ))}
          </div>
        </div>
        <div className="rounded-xl p-4 text-sm font-medium" style={{ backgroundColor:t.color+'15', color:t.color, border:`1px solid ${t.color}40` }}>{t.tip}</div>
        <button onClick={onDone} className="w-full text-white font-bold py-4 rounded-2xl text-base shadow-md transition-all hover:opacity-90" style={{ backgroundColor:t.color }}>
          ✏️ Start Practice!
        </button>
        {onHome && (
          <button onClick={onHome} className="w-full bg-white border-2 border-gray-200 text-gray-500 font-semibold py-3 rounded-2xl text-sm hover:bg-gray-50 transition-all">
            🏠 Return to Home
          </button>
        )}
      </div>
    </div>
  );
}

function getTeachPanel(subject, section) {
  const banks = { english:ENGLISH_TEACH, math:MATH_TEACH, science:SCIENCE_TEACH, malay:MALAY_TEACH };
  return banks[subject]?.[section] || null;
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: QUIZ
// ═══════════════════════════════════════════════════════════════
function QuizScreen({ subject, onDone, onBack, difficulty }) {
  function filterDiff(qs) {
    if (!difficulty || difficulty==='easy') return qs.filter(q=>!q.difficulty||q.difficulty==='easy');
    if (difficulty==='medium') return qs.filter(q=>q.difficulty==='medium');
    return qs.filter(q=>q.difficulty==='hard');
  }

  const [questions] = useState(()=>{
    const sectionOrder = {
      english:['Grammar','Vocabulary','Grammar Cloze','Editing','Comprehension','Synthesis'],
      math:['Section A: MCQ','Section B: Short Answer','Section C: Word Problems'],
      science:['Diversity','Cycles','Systems','Interactions','Energy'],
      malay:['Tatabahasa','Kosa Kata','Kefahaman','Karangan'],
    }[subject] || [];

    const result = [];
    sectionOrder.forEach(sec=>{
      const sqs = QB[subject].filter(q=>(q.section||q.topic)===sec);
      const filtered = filterDiff(sqs);
      const pool = filtered.length>=2 ? filtered : sqs.filter(q=>!q.difficulty||q.difficulty==='easy');
      const n = subject==='math' ? (sec==='Section C: Word Problems'?3:4) : 4;
      shuffle(pool).slice(0,n).forEach(q=>result.push({...q, shuffledOpts:q.opts?shuffle(q.opts):[]}));
    });
    return result.length ? result : shuffle(QB[subject]).slice(0,20).map(q=>({...q,shuffledOpts:q.opts?shuffle(q.opts):[]}));
  });

  const [idx, setIdx] = useState(0);
  const [selected, setSel] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const answersRef = useRef([]);
  const taughtSections = useRef(new Set());

  const firstKey = questions[0]?.section||questions[0]?.topic;
  const [showTeachFor, setShowTeachFor] = useState(()=>{
    if (firstKey && getTeachPanel(subject, firstKey)) return firstKey;
    return null;
  });

  const cfg = CFG[subject];
  const q = questions[idx];

  function dismissTeach() { taughtSections.current.add(showTeachFor); setShowTeachFor(null); }

  function pick(opt) {
    if (selected!==null) return;
    setSel(opt);
    answersRef.current = [...answersRef.current, { q, chosen:opt, correct: typeof q.ans==='number' ? q.opts[q.ans]===opt : opt===q.ans }];
  }

  function next() {
    if (idx+1>=questions.length) {
      const allA = answersRef.current;
      const score = allA.filter(a=>a.correct).length;
      const bd = {};
      allA.forEach(a=>{ const sec=a.q.section||a.q.topic||'General'; if(!bd[sec]) bd[sec]={correct:0,total:0}; bd[sec].total++; if(a.correct) bd[sec].correct++; });
      onDone(score, questions.length, bd);
    } else {
      const nextKey = questions[idx+1]?.section||questions[idx+1]?.topic;
      setIdx(i=>i+1); setSel(null); setShowHint(false);
      if (nextKey && getTeachPanel(subject,nextKey) && !taughtSections.current.has(nextKey)) setShowTeachFor(nextKey);
    }
  }

  if (showTeachFor) {
    const t = getTeachPanel(subject, showTeachFor);
    if (t) return <TeachPanel t={t} onDone={dismissTeach} onHome={onBack} />;
  }

  const pct = (idx/questions.length)*100;
  const ansOpt = q && q.opts && typeof q.ans==='number' ? q.opts[q.ans] : q?.ans;
  const isCorrect = selected!==null && (selected===ansOpt);
  const diffLabel = difficulty && difficulty!=='easy' ? ` · ${difficulty==='medium'?'🟡':'🔴'} ${difficulty.charAt(0).toUpperCase()+difficulty.slice(1)}` : '';

  if (!q) return null;
  return (
    <div className="min-h-screen flex flex-col" style={{ backgroundColor:cfg.bg }}>
      <div className="p-4 flex items-center gap-3 text-white" style={{ backgroundColor:cfg.hdr }}>
        <button onClick={onBack} className="text-white/70 hover:text-white text-xl" title="Return to Home">🏠</button>
        <div className="flex-1">
          <div className="flex justify-between text-xs mb-1.5 text-white/80">
            <span>{cfg.emoji} {cfg.label}{diffLabel}</span>
            <span>Q{idx+1}/{questions.length}</span>
          </div>
          <div className="w-full bg-white/30 rounded-full h-2">
            <div className="bg-white h-2 rounded-full transition-all duration-500" style={{width:`${pct}%`}} />
          </div>
        </div>
      </div>

      <div className="flex-1 p-5 flex flex-col gap-4 max-w-lg mx-auto w-full pop">
        {(q.section||q.topic) && (
          <div className="inline-flex items-center text-xs font-semibold px-3 py-1 rounded-full w-fit text-white" style={{backgroundColor:cfg.hdr+'cc'}}>
            {q.section||q.topic}
          </div>
        )}
        {q.passage && (
          <div className="bg-white rounded-2xl p-4 shadow-sm border-l-4" style={{borderColor:cfg.hdr}}>
            <p className="text-xs text-gray-600 italic leading-relaxed">{q.passage}</p>
          </div>
        )}
        <div className="bg-white rounded-2xl p-5 shadow-sm">
          <p className="text-base font-semibold text-gray-800 leading-relaxed">{q.q}</p>
        </div>

        <div className="flex flex-col gap-3">
          {q.opts && q.shuffledOpts.map((opt,i)=>{
            let cls = 'bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-400 cursor-pointer';
            if (selected!==null) {
              if (opt===ansOpt) cls='bg-green-50 border-2 border-green-500 text-green-800';
              else if (opt===selected) cls='bg-red-50 border-2 border-red-400 text-red-700';
              else cls='bg-white border-2 border-gray-200 text-gray-400 opacity-50';
            }
            return (
              <button key={i} onClick={()=>pick(opt)} className={`${cls} rounded-xl p-4 text-left font-medium transition-all text-sm`}>
                <span className="text-gray-400 mr-2 font-normal">{['A','B','C','D'][i]}.</span>{opt}
              </button>
            );
          })}
        </div>

        {selected!==null && (
          <div className={`rounded-xl p-4 pop ${isCorrect?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`}>
            <p className="font-semibold mb-1 text-sm">{isCorrect?'✅ Correct!':`❌ Answer: ${ansOpt}`}</p>
            {q.exp && <p className="text-xs text-gray-600" dangerouslySetInnerHTML={{__html:q.exp}} />}
          </div>
        )}

        {selected===null && q.hint && (
          <button onClick={()=>setShowHint(!showHint)} className="text-xs text-blue-600 hover:text-blue-700 font-semibold">
            {showHint?'💡 Hide hint':'💡 Show hint'}
          </button>
        )}
        {showHint && q.hint && (
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
            <p className="text-xs text-blue-800">{q.hint}</p>
          </div>
        )}

        {selected!==null && (
          <button onClick={next} className={`${cfg.btn} text-white font-bold py-3 rounded-xl transition-all pop`}>
            {idx+1>=questions.length?'See Results 🎉':'Next →'}
          </button>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: DRILL
// ═══════════════════════════════════════════════════════════════
function DrillScreen({ subject, topic, onDone, onBack, onHome }) {
  const [questions] = useState(()=>{
    const filtered = QB[subject].filter(q=>(q.section||q.topic)===topic && (!q.pool||q.pool!=='quiz'));
    const pool = filtered.length ? filtered : QB[subject].filter(q=>(q.section||q.topic)===topic);
    return shuffle(pool).slice(0,10).map(q=>({...q,shuffledOpts:q.opts?shuffle(q.opts):[]}));
  });
  const [queue, setQueue] = useState([...Array(Math.min(10,questions.length)).keys()]);
  const [idx, setIdx] = useState(0);
  const [selected, setSel] = useState(null);
  const cfg = CFG[subject];
  const q = questions[queue[idx]];

  function pick(opt) {
    if (selected!==null) return;
    setSel(opt);
    const ansOpt = typeof q.ans==='number' ? q.opts[q.ans] : q.ans;
    const isCorrect = opt===ansOpt;
    if (!isCorrect) {
      const newQ = [...queue.slice(1), queue[idx]];
      setTimeout(()=>{ setQueue(newQ); setIdx(0); setSel(null); }, 1200);
    }
  }

  function next() {
    if (queue.length===1) { onDone(true); return; }
    const newQ = queue.slice(1);
    setQueue(newQ); setIdx(0); setSel(null);
  }

  if (!q) return <div className="min-h-screen flex items-center justify-center text-gray-500">No questions available for this topic.</div>;

  const total = Math.min(10, questions.length);
  const correct = total - queue.length;
  const pct = (correct/total)*100;
  const ansOpt = typeof q.ans==='number' ? q.opts[q.ans] : q.ans;
  const isRight = selected!==null && selected===ansOpt;

  return (
    <div className="min-h-screen flex flex-col" style={{ backgroundColor:cfg.bg }}>
      <div className="p-4 flex items-center gap-3 text-white" style={{ backgroundColor:cfg.hdr }}>
        <button onClick={onHome||onBack} className="text-white/70 hover:text-white text-xl" title="Return to Home">🏠</button>
        <div className="flex-1">
          <div className="flex justify-between text-xs mb-1.5 text-white/80">
            <span>{cfg.emoji} Drill: {topic}</span>
            <span>{correct}/{total} correct</span>
          </div>
          <div className="w-full bg-white/30 rounded-full h-2">
            <div className="bg-white h-2 rounded-full transition-all duration-500" style={{width:`${pct}%`}} />
          </div>
        </div>
      </div>

      <div className="flex-1 p-5 flex flex-col gap-4 max-w-lg mx-auto w-full pop">
        <div className="inline-flex text-xs font-semibold px-3 py-1 rounded-full w-fit text-white" style={{backgroundColor:cfg.hdr+'cc'}}>
          {correct}/{total} Correct
        </div>
        {q.passage && (
          <div className="bg-white rounded-2xl p-4 shadow-sm border-l-4" style={{borderColor:cfg.hdr}}>
            <p className="text-xs text-gray-600 italic leading-relaxed">{q.passage}</p>
          </div>
        )}
        <div className="bg-white rounded-2xl p-5 shadow-sm">
          <p className="text-base font-semibold text-gray-800 leading-relaxed">{q.q}</p>
        </div>

        <div className="flex flex-col gap-3">
          {q.shuffledOpts.map((opt,i)=>{
            let cls='bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-400 cursor-pointer';
            if (selected!==null) {
              if (opt===ansOpt) cls='bg-green-50 border-2 border-green-500 text-green-800';
              else if (opt===selected) cls='bg-red-50 border-2 border-red-400 text-red-700';
              else cls='bg-white border-2 border-gray-200 text-gray-400 opacity-50';
            }
            return (
              <button key={i} onClick={()=>pick(opt)} className={`${cls} rounded-xl p-4 text-left font-medium transition-all text-sm`}>
                <span className="text-gray-400 mr-2 font-normal">{['A','B','C','D'][i]}.</span>{opt}
              </button>
            );
          })}
        </div>

        {selected!==null && (
          <div className={`rounded-xl p-4 pop ${isRight?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`}>
            <p className="font-semibold mb-1 text-sm">{isRight?'✅ Correct!':isRight===false&&!isRight?`❌ Answer: ${ansOpt}`:''}</p>
            {!isRight && <p className="font-semibold mb-1 text-sm text-red-700">❌ Answer: {ansOpt}</p>}
            {q.exp && <p className="text-xs text-gray-600" dangerouslySetInnerHTML={{__html:q.exp}} />}
            {!isRight && <p className="text-xs text-orange-600 mt-1">Moving to end of queue — try again!</p>}
          </div>
        )}

        {selected!==null && isRight && (
          <button onClick={next} className={`${cfg.btn} text-white font-bold py-3 rounded-xl transition-all pop`}>
            {queue.length===1?'✅ Complete!':'Continue →'}
          </button>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: RESULTS
// ═══════════════════════════════════════════════════════════════
function ResultsScreen({ subject, score, total, breakdown, mode, onHome, onRetry }) {
  const cfg = CFG[subject];
  const pct = Math.round((score/total)*100);
  const star = pct>=90?'🏆':pct>=70?'🌟':pct>=50?'👍':'💪';
  const msg = pct>=90?'Outstanding!':pct>=70?'Great job!':pct>=50?'Good effort!':'Keep going!';
  const showConf = pct>=70;

  useEffect(()=>{ saveResult(subject, mode, score, total, breakdown); }, []);

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6" style={{ backgroundColor:cfg.bg }}>
      {showConf && <Confetti />}
      <div className="bg-white rounded-3xl shadow-lg p-7 w-full max-w-sm text-center pop">
        <div className="text-6xl mb-2">{pct===100?'🌟':star}</div>
        <h2 className="text-4xl font-bold text-gray-800">{score}/{total}</h2>
        <p className={`text-lg font-semibold mt-1 ${pct>=70?'text-emerald-600':'text-orange-500'}`}>{pct}% — {msg}</p>
        {pct===100 && (
          <div className="mt-3 bg-blue-50 rounded-lg p-2">
            <p className="text-sm font-bold text-blue-800">🎉 Perfect {mode==='quiz'?'Quiz':'Drill'}! Well done, Aqil!</p>
          </div>
        )}
        <p className="text-gray-400 text-xs mt-2 mb-5">Score saved automatically ✓</p>

        <div className="text-left mb-5">
          <p className="font-semibold text-gray-600 text-xs uppercase tracking-wide mb-2">Topic Breakdown</p>
          {Object.entries(breakdown||{}).map(([topic,d])=>{
            const p=Math.round((d.correct/d.total)*100);
            const col=p>=80?'bg-emerald-500':p>=60?'bg-amber-400':'bg-red-400';
            return (
              <div key={topic} className="mb-2.5">
                <div className="flex justify-between text-xs text-gray-500 mb-1"><span>{topic}</span><span>{d.correct}/{d.total}</span></div>
                <div className="w-full bg-gray-100 rounded-full h-2"><div className={`${col} h-2 rounded-full`} style={{width:`${p}%`}} /></div>
              </div>
            );
          })}
        </div>

        <div className="flex gap-3">
          <button onClick={onRetry} className={`flex-1 ${cfg.btn} text-white font-semibold py-3 rounded-xl`}>Try Again</button>
          <button onClick={onHome} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 rounded-xl">Home</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: PROGRESS
// ═══════════════════════════════════════════════════════════════
function ProgressScreen({ onBack }) {
  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-100 to-indigo-100 pb-8">
      <div className="bg-blue-700 text-white p-6 flex items-center gap-3">
        <button onClick={onBack} className="text-white/70 hover:text-white text-xl">←</button>
        <h1 className="text-2xl font-bold">My Progress</h1>
      </div>
      <div className="max-w-lg mx-auto p-6 space-y-5">
        {Object.entries(CFG).map(([key,cfg])=>{
          const st = subjectStats(key);
          if (!st) return (
            <div key={key} className="bg-white rounded-2xl p-5 shadow-md">
              <div className="flex items-center gap-2 mb-1"><span className="text-2xl">{cfg.emoji}</span><h3 className="text-lg font-bold text-gray-700">{cfg.label}</h3></div>
              <p className="text-sm text-gray-400 italic">Not started yet</p>
            </div>
          );
          return (
            <div key={key} className="bg-white rounded-2xl p-5 shadow-md">
              <div className="flex items-center gap-2 mb-4">
                <span className="text-2xl">{cfg.emoji}</span>
                <h3 className="text-lg font-bold text-gray-800">{cfg.label}</h3>
                <span className="ml-auto text-xs text-gray-400">{st.count} session{st.count!==1?'s':''}</span>
              </div>
              <div className="grid grid-cols-2 gap-3 mb-3">
                <div className="bg-blue-50 rounded-xl p-3 text-center">
                  <div className="text-xl font-bold text-blue-600">{st.quizAvg!==null?`${st.quizAvg}%`:'—'}</div>
                  <div className="text-xs text-gray-500 mt-0.5">📝 Quiz Avg</div>
                </div>
                <div className="bg-violet-50 rounded-xl p-3 text-center">
                  <div className="text-xl font-bold text-violet-600">{st.drillAvg!==null?`${st.drillAvg}%`:'—'}</div>
                  <div className="text-xs text-gray-500 mt-0.5">⚡ Drill Avg</div>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-green-50 rounded-xl p-3 text-center">
                  <div className="text-xl font-bold text-green-600">{st.best}%</div>
                  <div className="text-xs text-gray-500 mt-0.5">🏆 Best</div>
                </div>
                <div className="bg-yellow-50 rounded-xl p-3 text-center">
                  <div className="text-xl font-bold text-yellow-600">{st.perfectDrills}</div>
                  <div className="text-xs text-gray-500 mt-0.5">⭐ Perfect Drills</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: TOPIC SELECT
// ═══════════════════════════════════════════════════════════════
function TopicSelectScreen({ subject, onSelect, onBack }) {
  const cfg = CFG[subject];
  const topics = {
    english:['Grammar','Vocabulary','Grammar Cloze','Editing','Comprehension'],
    math:['Section A: MCQ','Section B: Short Answer','Section C: Word Problems'],
    science:['Diversity','Cycles','Systems','Interactions','Energy'],
    malay:['Tatabahasa','Kosa Kata','Kefahaman','Karangan'],
  }[subject]||[];

  return (
    <div className="min-h-screen flex flex-col" style={{ backgroundColor:cfg.bg }}>
      <div className="p-5 flex items-center gap-3 text-white" style={{ backgroundColor:cfg.hdr }}>
        <button onClick={onBack} className="text-white/70 hover:text-white text-xl">←</button>
        <h1 className="text-xl font-bold">Choose Topic — Drill Mode</h1>
      </div>
      <div className="flex-1 p-6 max-w-lg mx-auto w-full space-y-3">
        {topics.map(t=>(
          <button key={t} onClick={()=>onSelect(t)}
            className="w-full bg-white rounded-2xl p-4 shadow hover:shadow-md transition-all text-left font-semibold text-gray-800 hover:scale-105 active:scale-95"
            style={{ borderLeft:`4px solid ${cfg.hdr}` }}>
            {t}
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState('home');
  const [subject, setSubj] = useState(null);
  const [mode, setMode] = useState(null);
  const [topic, setTopic] = useState(null);
  const [result, setResult] = useState(null);
  const [difficulty, setDiff] = useState('easy');

  function onSubjectSelect(s) { setSubj(s); setScreen('subject-select'); }
  function onMode(m, diff='easy') {
    setDiff(diff);
    if (m==='drill') { setMode('drill'); setScreen('select-topic'); }
    else { setMode('quiz'); setScreen('quiz'); }
  }
  function onDone(score, total, breakdown) { setResult({score,total,breakdown}); setScreen('result'); }
  function onDrillDone() { setResult({score:10,total:10,breakdown:{[topic]:{correct:10,total:10}}}); setScreen('result'); }

  return (
    <>
      {screen==='home' && <HomeScreen onSelect={onSubjectSelect} onProgress={()=>setScreen('progress')} />}
      {screen==='subject-select' && <SubjectSelectScreen subject={subject} onMode={onMode} onBack={()=>setScreen('home')} />}
      {screen==='select-topic' && <TopicSelectScreen subject={subject} onSelect={t=>{setTopic(t);setScreen('drill');}} onBack={()=>setScreen('subject-select')} />}
      {screen==='quiz' && <QuizScreen subject={subject} onDone={onDone} onBack={()=>setScreen('home')} difficulty={difficulty} />}
      {screen==='drill' && <DrillScreen subject={subject} topic={topic} onDone={onDrillDone} onBack={()=>setScreen('select-topic')} onHome={()=>setScreen('home')} />}
      {screen==='result' && result && (
        <ResultsScreen subject={subject} score={result.score} total={result.total} breakdown={result.breakdown} mode={mode}
          onHome={()=>setScreen('home')}
          onRetry={()=>{ if(mode==='drill') setScreen('select-topic'); else setScreen('subject-select'); }} />
      )}
      {screen==='progress' && <ProgressScreen onBack={()=>setScreen('home')} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
