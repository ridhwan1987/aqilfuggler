    { id:'e72', section:'Grammar', difficulty:'easy', q:'She ___ her lunch and then went for recess.', opts:['finish','finishes','finished','finishing'], ans:2, exp:'Past tense requires <strong>finished</strong>.', hint:'Action already done.' },
    { id:'e73', section:'Vocabulary', difficulty:'easy', q:'Choose the word closest in meaning to purchase.', opts:['sell','borrow','buy','return'], ans:2, exp:'Purchase means the same as <strong>buy</strong>.', hint:'What you do at a shop.' },
    { id:'e74', section:'Grammar', difficulty:'easy', q:'There ___ many stalls selling delicious food at the food festival.', opts:['is','are','was','were'], ans:3, exp:'Past tense plural subject uses <strong>were</strong>.', hint:'Many stalls (plural) in the past.' },
    { id:'e75', section:'Grammar', difficulty:'easy', q:'We should ___ our elderly neighbours with respect.', opts:['treat','treats','treated','treating'], ans:0, exp:'After modal should use the base form <strong>treat</strong>.', hint:'should + base verb.' },
    { id:'e76', section:'Vocabulary', difficulty:'easy', q:'Choose the word opposite in meaning to cheerful.', opts:['happy','jolly','gloomy','excited'], ans:2, exp:'Cheerful means happy so the antonym is <strong>gloomy</strong>.', hint:'The opposite of a sunny mood.' },
    { id:'e77', section:'Grammar', difficulty:'easy', q:'___ is raining heavily outside so we cannot go to the playground.', opts:['There','It','This','That'], ans:1, exp:'We use <strong>It</strong> for weather sentences.', hint:'Weather sentences start with It.' },
    { id:'e78', section:'Grammar', difficulty:'easy', q:'The teacher gave ___ a sticker for answering correctly.', opts:['I','me','my','mine'], ans:1, exp:'Object pronoun after a verb is <strong>me</strong>.', hint:'Object pronoun after a verb.' },
    { id:'e79', section:'Vocabulary', difficulty:'easy', q:'The aroma of freshly baked bread ___ through the bakery.', opts:['dripped','wafted','crashed','marched'], ans:1, exp:'Smells <strong>waft</strong> meaning they drift gently through the air.', hint:'How a smell moves through the air.' },
    { id:'em01', section:'Editing', difficulty:'medium', q:'Identify the error: Every student in the school have to wear a white uniform.', opts:['Every student','in the school','have to wear','a white uniform'], ans:2, exp:'Every student is singular so we need <strong>has</strong> to wear not have.', hint:'Every + singular noun uses singular verb.' },
    { id:'em02', section:'Editing', difficulty:'medium', q:'Identify the error: The news are very shocking to the whole community.', opts:['The news','are very','shocking to','the whole community'], ans:1, exp:'News is uncountable and takes a singular verb so it should be <strong>is</strong> very shocking.', hint:'News is always singular.' },
    { id:'em03', section:'Editing', difficulty:'medium', q:'Identify the error: She has went to the market with her grandmother this morning.', opts:['She has','went to','the market','this morning'], ans:1, exp:'After has we need the past participle <strong>gone</strong> not went.', hint:'has + past participle.' },
    { id:'em04', section:'Editing', difficulty:'medium', q:'Identify the error: Ali and his brother plays football at the field every evening.', opts:['Ali and his brother','plays football','at the field','every evening'], ans:1, exp:'A compound subject takes <strong>play</strong> not plays.', hint:'Two people need a plural verb.' },
    { id:'em05', section:'Editing', difficulty:'medium', q:'Identify the error: She was exhausted but she continued studying lately into the night.', opts:['She was exhausted','but she continued','studying lately','into the night'], ans:2, exp:'Lately means recently but the correct word here is <strong>late</strong> meaning until a late hour.', hint:'Late into the night not lately.' },
    { id:'em06', section:'Editing', difficulty:'medium', q:'Identify the error: The teacher gived us a lot of homework over the holidays.', opts:['The teacher','gived us','a lot of homework','over the holidays'], ans:1, exp:'Give is an irregular verb and its past tense is <strong>gave</strong> not gived.', hint:'Irregular verb: give becomes gave.' },
    { id:'em07', section:'Editing', difficulty:'medium', q:'Identify the error: He could not bare to see his friend cry.', opts:['He could not','bare to see','his friend','cry'], ans:1, exp:'Bare means naked but the correct word here is <strong>bear</strong> meaning to tolerate.', hint:'Bear = to tolerate.' },
    { id:'em08', section:'Editing', difficulty:'medium', q:'Identify the error: Raju is more smarter than anyone else in his class.', opts:['Raju is','more smarter','than anyone else','in his class'], ans:1, exp:'We cannot use more with an -er comparative so it should be just <strong>smarter</strong>.', hint:'Cannot say more smarter.' },
    { id:'em09', section:'Grammar', difficulty:'medium', q:'By the time the teacher arrived the pupils ___ already completed the activity.', opts:['have','had','has','were'], ans:1, exp:'By the time signals past perfect so we use <strong>had</strong> already completed.', hint:'Earlier past action uses past perfect.' },
    { id:'em10', section:'Grammar', difficulty:'medium', q:'The report ___ written by the head prefect last night.', opts:['is','was','has been','will be'], ans:1, exp:'Passive voice in the past tense uses <strong>was written</strong>.', hint:'Passive past: was + past participle.' },
    { id:'em11', section:'Grammar', difficulty:'medium', q:'Siti told her mother that she ___ her best in the competition.', opts:['will do','would do','has done','does'], ans:1, exp:'In reported speech will shifts to <strong>would</strong> when the reporting verb is past.', hint:'Reported speech backshift: will becomes would.' },
    { id:'em12', section:'Grammar', difficulty:'medium', q:'She has been living in Tampines ___ she was born.', opts:['for','since','during','from'], ans:1, exp:'<strong>Since</strong> is used with a specific point in time together with the present perfect.', hint:'A specific time point uses since.' },
    { id:'em13', section:'Grammar', difficulty:'medium', q:'The team has worked on this project ___ three months.', opts:['since','for','during','within'], ans:1, exp:'<strong>For</strong> is used with a duration of time.', hint:'A length of time uses for.' },
    { id:'em14', section:'Grammar', difficulty:'medium', q:'Meiling wishes she ___ speak French fluently.', opts:['can','could','will','would'], ans:1, exp:'Wish expresses something hypothetical so we use <strong>could</strong>.', hint:'Wish = hypothetical so use could.' },
    { id:'em15', section:'Grammar', difficulty:'medium', q:'If you ___ harder you would have passed the examination.', opts:['study','studied','had studied','have studied'], ans:2, exp:'Third conditional for a past unreal situation uses <strong>had studied</strong>.', hint:'Past unreal: if + had + past participle.' },
    { id:'em16', section:'Vocabulary', difficulty:'medium', q:'Choose the word closest in meaning to apprehensive.', opts:['relieved','anxious','confident','delighted'], ans:1, exp:'Apprehensive means worried or anxious about what might happen so the synonym is <strong>anxious</strong>.', hint:'Worried about what might happen.' },
    { id:'em17', section:'Vocabulary', difficulty:'medium', q:'The detective managed to ___ the identity of the thief from the clues left at the scene.', opts:['ignore','deduce','confirm','reveal'], ans:1, exp:'<strong>Deduce</strong> means to reach a conclusion through reasoning from evidence.', hint:'Figure out from clues.' },
    { id:'em18', section:'Vocabulary', difficulty:'medium', q:'The school committee decided to ___ the annual Sports Day due to the wet weather.', opts:['celebrate','postpone','cancel','organise'], ans:1, exp:'<strong>Postpone</strong> means to put off an event to a later time.', hint:'Move to a later date.' },
    { id:'em19', section:'Vocabulary', difficulty:'medium', q:'Choose the word closest in meaning to deteriorate.', opts:['improve','worsen','remain','develop'], ans:1, exp:'Deteriorate means to become worse so the synonym is <strong>worsen</strong>.', hint:'Going from bad to worse.' },
    { id:'em20', section:'Vocabulary', difficulty:'medium', q:'The pupil gave a very ___ answer that impressed the judges.', opts:['vague','concise','lengthy','irrelevant'], ans:1, exp:'<strong>Concise</strong> means brief and to the point.', hint:'Short and clear.' },
    { id:'em21', section:'Grammar', difficulty:'medium', q:'She asked me ___ I had finished my project yet.', opts:['that','if','what','whether to'], ans:1, exp:'An indirect yes/no question uses <strong>if</strong> or whether.', hint:'Yes/no indirect question uses if or whether.' },
    { id:'em22', section:'Grammar', difficulty:'medium', q:'Raju suggested ___ to the library after school.', opts:['go','to go','going','gone'], ans:2, exp:'Suggest is followed by a gerund so we use <strong>going</strong>.', hint:'Suggest + gerund (-ing form).' },
    { id:'em23', section:'Grammar', difficulty:'medium', q:'The teacher reminded the pupils ___ their permission slips.', opts:['bring','to bring','bringing','for bringing'], ans:1, exp:'Remind someone to do something uses the infinitive so we need <strong>to bring</strong>.', hint:'Remind + object + to + verb.' },
    { id:'em24', section:'Grammar', difficulty:'medium', q:'___ being tired she helped her mother cook dinner.', opts:['Although','Despite','Because of','Due to'], ans:1, exp:'<strong>Despite</strong> is followed by a noun or gerund phrase not a full clause.', hint:'Despite + noun/gerund.' },
    { id:'em25', section:'Grammar', difficulty:'medium', q:'He not only sings ___ plays three musical instruments.', opts:['or','but also','and also','as well'], ans:1, exp:'Not only must be paired with <strong>but also</strong> as they form a fixed correlative conjunction.', hint:'Not only...but also.' },
    { id:'em26', section:'Editing', difficulty:'medium', q:'Identify the error: Siti has lived in Bedok since ten years.', opts:['Siti has lived','in Bedok','since ten years','(no error)'], ans:2, exp:'With a duration of time we use for not since so it should be <strong>for ten years</strong>.', hint:'Duration uses for; a point in time uses since.' },
    { id:'em27', section:'Editing', difficulty:'medium', q:'Identify the error: He could of helped you if you had asked him.', opts:['He could','of helped','you if','you had asked him'], ans:1, exp:'Could of is a common mistake; the correct form is <strong>could have</strong>.', hint:'Always could have never could of.' },
    { id:'em28', section:'Editing', difficulty:'medium', q:'Identify the error: The informations given in the report was incorrect.', opts:['The informations','given in the report','was incorrect','(no error)'], ans:0, exp:'Information is an uncountable noun so it has no plural form and should be <strong>The information</strong>.', hint:'Information has no plural form.' },
    { id:'em29', section:'Editing', difficulty:'medium', q:'Identify the error: He asked me to past the salt across the table.', opts:['He asked me','to past the salt','across the table','(no error)'], ans:1, exp:'Past is an adjective or preposition but the verb needed here is <strong>pass</strong>.', hint:'Pass the salt not past the salt.' },
    { id:'em30', section:'Comprehension', difficulty:'medium', q:'The hawker smiled as he handed Ali a bowl of hot laksa and declared This is the best in Singapore! Why did the hawker smile?', opts:['He was relieved the day was ending.','He was proud of his food.','He recognised Ali as a regular customer.','He had just received a compliment.'], ans:1, exp:'Declaring his laksa the best in Singapore shows the hawker was <strong>proud of his food</strong>.', hint:'What does declared proudly tell you?' },
    { id:'em31', section:'Comprehension', difficulty:'medium', q:'Despite the pouring rain the spectators remained in their seats at the National Stadium waving their flags eagerly. What does this tell us about the spectators?', opts:['They were unhappy about the rain.','They were very dedicated supporters.','They were waiting for the rain to stop.','They did not notice the rain.'], ans:1, exp:'Staying in heavy rain to wave flags shows they were <strong>very dedicated supporters</strong>.', hint:'Would you stay in the rain unless you really cared?' },
    { id:'em32', section:'Comprehension', difficulty:'medium', q:'Meiling had studied hard yet when she saw the examination paper her mind went blank. What does her mind went blank mean?', opts:['She fell asleep.','She could not recall anything.','She was daydreaming.','She felt calm.'], ans:1, exp:'Mind went blank is an idiom meaning she <strong>could not recall anything</strong>.', hint:'Blank = empty.' },
    { id:'eh01', section:'Synthesis', difficulty:'hard', q:'Combine using ALTHOUGH: Ali was very tired. He still helped his mother with the housework.', opts:['Although Ali was very tired, he still helped his mother with the housework.','Although Ali was very tired, but he still helped his mother.','Ali was very tired, although but he still helped his mother.','Although he still helped his mother, Ali was very tired too.'], ans:0, exp:'Although introduces a contrast clause and must not be followed by but.', hint:'Although + clause, + clause. No but.' },
    { id:'eh02', section:'Synthesis', difficulty:'hard', q:'Combine using SO...THAT: The test was very difficult. Many students could not finish it.', opts:['The test was so difficult that many students could not finish it.','The test was so difficult so many students could not finish it.','The test was such difficult that many students could not finish it.','So the test was difficult that many students could not finish it.'], ans:0, exp:'So + adjective + that is the correct pattern.', hint:'so + adj + that.' },
    { id:'eh03', section:'Synthesis', difficulty:'hard', q:'Combine using SUCH...THAT: It was a very exciting match. The crowd cheered loudly throughout.', opts:['It was such an exciting match that the crowd cheered loudly throughout.','It was so exciting match that the crowd cheered loudly throughout.','It was such exciting match that the crowd cheered loudly throughout.','Such an exciting match was it that the crowd cheered loudly.'], ans:0, exp:'Such + a/an + adjective + noun + that is the correct pattern.', hint:'such + a/an + adj + noun + that.' },
    { id:'eh04', section:'Synthesis', difficulty:'hard', q:'Combine using NOT ONLY...BUT ALSO: Meiling sings beautifully. She also plays the piano very well.', opts:['Meiling not only sings beautifully but also plays the piano very well.','Not only Meiling sings beautifully but also plays the piano very well.','Meiling not only sings beautifully but she also plays the piano very well.','Meiling sings beautifully not only but also plays the piano very well.'], ans:0, exp:'The subject comes before not only: Meiling not only sings beautifully but also plays the piano very well.', hint:'Subject + not only + V1 + but also + V2.' },
    { id:'eh05', section:'Synthesis', difficulty:'hard', q:'Combine using BECAUSE: Raju did not study hard. He did not pass the examination.', opts:['Raju did not pass the examination because he did not study hard.','Because Raju did not study hard but he did not pass the examination.','Raju did not study hard because he did not pass the examination.','Raju did not pass the examination because of he did not study hard.'], ans:0, exp:'Result + because + cause. No so is needed when because is used.', hint:'Result because cause. No so needed.' },
    { id:'eh06', section:'Synthesis', difficulty:'hard', q:'Combine using WHICH: The dog belongs to my neighbour. The dog barks every night.', opts:['The dog, which belongs to my neighbour, barks every night.','The dog which belongs to my neighbour and barks every night.','My neighbour dog which barks every night belongs to him.','The dog that my neighbour belongs to it barks every night.'], ans:0, exp:'A non-defining relative clause with which uses commas: The dog, which belongs to my neighbour, barks every night.', hint:'Use which for things or animals with commas for extra information.' },
    { id:'eh07', section:'Synthesis', difficulty:'hard', q:'Combine using WHOSE: The girl won the science prize. Her project was about solar energy.', opts:['The girl whose project was about solar energy won the science prize.','The girl who her project was about solar energy won the science prize.','The girl which project was about solar energy won the science prize.','The girl, her project was about solar energy, won the science prize.'], ans:0, exp:'Whose replaces a possessive pronoun in a relative clause.', hint:'Whose = possessive relative pronoun.' },
    { id:'eh08', section:'Synthesis', difficulty:'hard', q:'Combine using UNLESS: You do not practise daily. You will not improve.', opts:['Unless you practise daily, you will not improve.','Unless you do not practise daily, you will not improve.','You will not improve unless you do not practise daily.','Unless you practise daily, you will improve.'], ans:0, exp:'Unless already means if not so do not add another negative.', hint:'Unless = if not. Remove the extra not.' },
    { id:'eh09', section:'Synthesis', difficulty:'hard', q:'Combine using DESPITE: Siti ran very fast. She could not catch the bus.', opts:['Despite running very fast, Siti could not catch the bus.','Despite she ran very fast, Siti could not catch the bus.','Despite of running very fast, Siti could not catch the bus.','Despite running very fast but Siti could not catch the bus.'], ans:0, exp:'Despite is followed by a gerund phrase with no of after it.', hint:'Despite + noun/gerund. No of after despite.' },
    { id:'eh10', section:'Synthesis', difficulty:'hard', q:'Combine using IN SPITE OF: The weather was bad. We could not go to Sentosa.', opts:['In spite of the bad weather, we could not go to Sentosa.','In spite of the weather was bad, we could not go to Sentosa.','In spite of bad weather but we could not go to Sentosa.','We could not go to Sentosa in spite the bad weather.'], ans:0, exp:'In spite of is followed by a noun phrase.', hint:'In spite of + noun/gerund.' },
    { id:'eh11', section:'Synthesis', difficulty:'hard', q:'Combine using IF (first conditional): You work hard. You will succeed.', opts:['If you work hard, you will succeed.','If you work hard, you would succeed.','If you will work hard, you will succeed.','If you worked hard, you will succeed.'], ans:0, exp:'First conditional uses If + present simple + will + base form.', hint:'Real condition: If + present then will.' },
    { id:'eh12', section:'Synthesis', difficulty:'hard', q:'Combine using IF (second conditional): Ali had more pocket money. He would donate to charity.', opts:['If Ali had more pocket money, he would donate to charity.','If Ali has more pocket money, he will donate to charity.','If Ali would have more pocket money, he would donate to charity.','If Ali had more pocket money, he will donate to charity.'], ans:0, exp:'Second conditional uses If + past simple + would + base form.', hint:'If + past simple then would.' },
    { id:'eh13', section:'Editing', difficulty:'hard', q:'Identify the error: The committee, together with the principal, are planning the school anniversary dinner.', opts:['The committee','together with the principal','are planning','the school anniversary dinner'], ans:2, exp:'Together with does not make the subject plural. The main subject is the committee (singular) so we need <strong>is planning</strong>.', hint:'Together with does not change the subject.' },
    { id:'eh14', section:'Editing', difficulty:'hard', q:'Identify the error: The number of students who skipped class have increased this term.', opts:['The number of students','who skipped class','have increased','this term'], ans:2, exp:'The number is singular so we need <strong>has increased</strong>.', hint:'The number of always takes a singular verb.' },
    { id:'eh15', section:'Editing', difficulty:'hard', q:'Identify the error: Between you and I the new teacher is quite strict.', opts:['Between you','and I','the new teacher','is quite strict'], ans:1, exp:'After a preposition we use object pronouns so it should be <strong>between you and me</strong>.', hint:'After prepositions use me not I.' },
    { id:'eh16', section:'Editing', difficulty:'hard', q:'Identify the error: No sooner had she arrived home than she starts to feel unwell.', opts:['No sooner had','she arrived home','than she starts','to feel unwell'], ans:2, exp:'No sooner...than requires past tense throughout so it should be <strong>than she started</strong>.', hint:'No sooner had...than + past tense.' },
    { id:'eh17', section:'Editing', difficulty:'hard', q:'Identify the error: He denied to take the money from the drawer.', opts:['He denied','to take','the money','from the drawer'], ans:1, exp:'Deny is followed by a gerund not an infinitive so it should be <strong>denied taking</strong>.', hint:'Deny + gerund not infinitive.' },
    { id:'eh18', section:'Comprehension', difficulty:'hard', q:'Mr Tan placed the trophy gently on the shelf running his fingers along its surface before stepping back to admire it. A small smile played on his lips. What can we infer about Mr Tan?', opts:['He had just bought the trophy.','He was very proud of the trophy.','He was worried the trophy would fall.','He wanted to clean the trophy.'], ans:1, exp:'His gentle handling and the admiring smile suggest that Mr Tan felt <strong>great pride and deep attachment</strong> towards the trophy.', hint:'What do gentle handling and an admiring smile suggest?' },
    { id:'eh19', section:'Comprehension', difficulty:'hard', q:'The river once crystal clear and teeming with fish now ran grey and sluggish through the town. Children who used to play on its banks no longer came. What is the main message?', opts:['The river has become dangerous for children.','The river has been severely polluted over time.','The children have grown up and no longer play outside.','The town has become too busy for outdoor activities.'], ans:1, exp:'The contrast between crystal clear and grey and sluggish strongly implies <strong>severe pollution over time</strong>.', hint:'Clear to grey and sluggish equals pollution.' },
    { id:'eh20', section:'Comprehension', difficulty:'hard', q:'The teacher returned the marked scripts without a word. One by one students glanced at their marks then at each other the silence growing heavier by the second. What atmosphere does this passage create?', opts:['A relaxed and comfortable atmosphere','A tense and anxious atmosphere','An excited and joyful atmosphere','A boring and dull atmosphere'], ans:1, exp:'The wordless return of scripts combined with silence growing heavier creates a <strong>tense and anxious</strong> atmosphere.', hint:'Silence growing heavier equals rising tension.' }
  ],

  math: [
    // ── Section A: MCQ (easy, drill) ──
    { id:'m01', section:'Section A: MCQ', tag:'mcq', difficulty:'easy', q:'What is the value of 3² + 4²?', opts:['25','49','14','7'], ans:0, hint:'3² = 9, 4² = 16', exp:'3² + 4² = 9 + 16 = <strong>25</strong>' },
    { id:'m02', section:'Section A: MCQ', tag:'mcq', difficulty:'easy', q:'Simplify: 3a + 5b − a + 2b', opts:['2a + 7b','4a + 3b','2a + 3b','4a + 7b'], ans:0, hint:'Collect like terms: 3a − a = 2a, 5b + 2b = 7b', exp:'3a − a = 2a; 5b + 2b = 7b → <strong>2a + 7b</strong>' },
    { id:'m03', section:'Section A: MCQ', tag:'mcq', difficulty:'easy', q:'Which of the following is a prime number?', opts:['51','57','59','63'], ans:2, hint:'Check divisibility: 51=3×17, 57=3×19, 59=?, 63=9×7', exp:'<strong>59</strong> is prime — it has no factors other than 1 and itself' },
    { id:'m04', section:'Section A: MCQ', tag:'mcq', difficulty:'easy', q:'A triangle has angles 47° and 68°. What is the third angle?', opts:['65°','75°','55°','85°'], ans:0, hint:'Sum of angles in a triangle = 180°', exp:'180° − 47° − 68° = <strong>65°</strong>' },
    { id:'m05', section:'Section A: MCQ', tag:'mcq', difficulty:'easy', q:'The mean of 5 numbers is 12. Their sum is:', opts:['60','17','5','2.4'], ans:0, hint:'Mean = Sum ÷ Count, so Sum = Mean × Count', exp:'Sum = 12 × 5 = <strong>60</strong>' },
    // ── Section B: Short Answer (easy, drill) ──
    { id:'m06', section:'Section B: Short Answer', tag:'short', difficulty:'easy', q:'Solve: 4x − 7 = 17. What is x?', opts:['5','6','7','8'], ans:1, hint:'Add 7 to both sides first, then divide by 4', exp:'4x = 17 + 7 = 24; x = 24 ÷ 4 = <strong>6</strong>' },
    { id:'m07', section:'Section B: Short Answer', tag:'short', difficulty:'easy', q:'Express 45 minutes as a fraction of 3 hours in simplest form.', opts:['1/4','1/3','15/36','3/12'], ans:0, hint:'3 hours = 180 minutes. Then simplify 45/180', exp:'45/180 = 1/4 → <strong>1/4</strong>' },
    { id:'m08', section:'Section B: Short Answer', tag:'short', difficulty:'easy', q:'A rectangle has area 84 cm² and length 12 cm. Find its perimeter.', opts:['38 cm','40 cm','42 cm','44 cm'], ans:0, hint:'Width = Area ÷ Length. Then Perimeter = 2×(L+W)', exp:'W = 84÷12 = 7 cm. P = 2×(12+7) = 2×19 = <strong>38 cm</strong>' },
    { id:'m09', section:'Section B: Short Answer', tag:'short', difficulty:'easy', q:'Find the area of a circle with diameter 14 cm. (Use π = 22/7)', opts:['44 cm²','88 cm²','154 cm²','616 cm²'], ans:2, hint:'Radius = diameter ÷ 2 = 7 cm. Area = π × r²', exp:'Area = (22/7) × 7 × 7 = 22 × 7 = <strong>154 cm²</strong>' },
    { id:'m10', section:'Section B: Short Answer', tag:'short', difficulty:'easy', q:'The ratio of red to blue marbles is 2:5. There are 35 marbles in total. How many are red?', opts:['10','14','21','25'], ans:0, hint:'Total parts = 7. Each part = 35 ÷ 7 = 5', exp:'Red = 2 × 5 = <strong>10</strong>' },
    // ── Section C: Word Problems (easy, drill) ──
    { id:'m11', section:'Section C: Word Problems', tag:'word', difficulty:'easy', q:'Ali earns $1 800 a month. He saves 25% and spends the rest. How much does he spend?', opts:['$450','$900','$1 350','$1 600'], ans:2, hint:'Spends = 100% − 25% = 75% of $1800', exp:'75% × $1800 = 0.75 × 1800 = <strong>$1 350</strong>' },
    { id:'m12', section:'Section C: Word Problems', tag:'word', difficulty:'easy', q:'A car travels at 80 km/h. How far does it travel in 2 hours 30 minutes?', opts:['160 km','180 km','200 km','220 km'], ans:2, hint:'Distance = Speed × Time. Convert 2h 30min to hours first.', exp:'2.5 hours × 80 km/h = <strong>200 km</strong>' },
    { id:'m24', section:'Section C: Word Problems', tag:'word', difficulty:'easy', q:'A bag of rice weighs 5 kg. A shop has 48 such bags. How many kg of rice does the shop have altogether?', opts:['240 kg','230 kg','53 kg','43 kg'], ans:0, hint:'Total = number of bags × weight per bag', exp:'48 × 5 = <strong>240 kg</strong>' },
    { id:'m25', section:'Section C: Word Problems', tag:'word', difficulty:'easy', q:'Siti has $200. She spends $45 on a book and $78 on shoes. How much does she have left?', opts:['$77','$87','$123','$133'], ans:0, hint:'Subtract both amounts from $200', exp:'$200 − $45 − $78 = $200 − $123 = <strong>$77</strong>' },
    { id:'m26', section:'Section C: Word Problems', tag:'word', difficulty:'easy', q:'A class of 40 students took a test. 3/5 of them passed. How many students failed?', opts:['16','24','8','32'], ans:0, hint:'Find how many passed first, then subtract from 40', exp:'Passed = 3/5 × 40 = 24. Failed = 40 − 24 = <strong>16</strong>' },
    { id:'m27', section:'Section C: Word Problems', tag:'word', difficulty:'easy', q:'A factory produces 360 items per hour. How many items does it produce in 8 hours?', opts:['2 880','2 080','368','3 600'], ans:0, hint:'Total = rate × time', exp:'360 × 8 = <strong>2 880</strong> items' },
    // ── Medium / Quiz-only ──
    { id:'m13', section:'Section A: MCQ', tag:'mcq', difficulty:'medium', pool:'quiz', q:'The LCM of 12 and 18 is:', opts:['6','36','72','216'], ans:1, hint:'LCM is the smallest number divisible by BOTH. 12=2²×3, 18=2×3²', exp:'LCM = 2² × 3² = 4 × 9 = <strong>36</strong>' },
    { id:'m14', section:'Section A: MCQ', tag:'mcq', difficulty:'medium', pool:'quiz', q:'If 30% of a number is 45, what is the number?', opts:['13.5','135','150','300'], ans:2, hint:'30% = 45, so 1% = 45÷30. Then 100% = ?', exp:'1% = 1.5. 100% = 1.5 × 100 = <strong>150</strong>' },
    { id:'m15', section:'Section B: Short Answer', tag:'short', difficulty:'medium', pool:'quiz', q:'Shop A sells a laptop for $1200 at 20% discount. Shop B sells the same laptop for $850. How much cheaper is Shop B?', opts:['$110','$120','$350','$310'], ans:0, hint:'Find Shop A\'s discounted price first: $1200 × 80%', exp:'Shop A: $1200 × 80% = $960. Difference = $960 − $850 = <strong>$110</strong>' },
    { id:'m16', section:'Section B: Short Answer', tag:'short', difficulty:'medium', pool:'quiz', q:'A cuboid fish tank is 50 cm long, 30 cm wide, 40 cm deep. Water fills 3/4 of it. Find the volume of water in litres. (1 litre = 1000 cm³)', opts:['45 litres','60 litres','18 litres','180 litres'], ans:0, hint:'Volume of tank = L×W×H. Then take 3/4 of it. Convert cm³ to litres.', exp:'Tank = 50×30×40 = 60000 cm³. Water = 3/4 × 60000 = 45000 cm³ = <strong>45 litres</strong>' },
    { id:'m17', section:'Section C: Word Problems', tag:'word', difficulty:'medium', pool:'quiz', q:'Ali and Ben share money in ratio 3:7. Ben gives $60 to Ali. They now have equal amounts. How much did Ali have at first?', opts:['$90','$120','$150','$210'], ans:0, hint:'After transfer they\'re equal. Work backwards from the transfer.', exp:'Let Ali=3u, Ben=7u. After transfer: 3u+60 = 7u−60 → 120=4u → u=30. Ali = 3×30 = <strong>$90</strong>' },
    { id:'m18', section:'Section C: Word Problems', tag:'word', difficulty:'medium', pool:'quiz', q:'Train A leaves at 7am at 60 km/h. Train B leaves at 8am at 90 km/h in the same direction. At what time does Train B catch Train A?', opts:['9am','10am','11am','12pm'], ans:1, hint:'By 8am, Train A is 60km ahead. Closing speed = 90−60 = 30 km/h', exp:'Gap = 60km. Time to close = 60÷30 = 2h. 8am + 2h = <strong>10am</strong>' },
    { id:'m19', section:'Section A: MCQ', tag:'mcq', difficulty:'medium', pool:'quiz', q:'The volume of a cylinder is 1540 cm³ and its height is 10 cm. Find its radius. (π = 22/7)', opts:['7 cm','14 cm','49 cm','3.5 cm'], ans:0, hint:'V = π r² h. Rearrange: r² = V ÷ (πh)', exp:'r² = 1540 ÷ (22/7 × 10) = 1540 ÷ (220/7) = 1540 × 7/220 = 49. r = <strong>7 cm</strong>' },
    // ── Hard / Quiz-only ──
    { id:'m20', section:'Section C: Word Problems', tag:'word', difficulty:'hard', pool:'quiz', q:'A 20% salt solution contains 80g of salt. Water is added until the solution is 16% salt. How much water was added?', opts:['50 g','80 g','100 g','200 g'], ans:0, hint:'Total original solution = 80÷20% = 400g. New total = 80÷16% = 500g. Water added = ?', exp:'Original = 80÷0.2 = 400g. New total = 80÷0.16 = 500g. Water added = 500−400 = <strong>50g</strong>' },
    { id:'m21', section:'Section C: Word Problems', tag:'word', difficulty:'hard', pool:'quiz', q:'Ali cycled from Town A to Town B at 12 km/h, then returned at 8 km/h. What was his average speed for the whole journey?', opts:['9.6 km/h','10 km/h','10.5 km/h','20 km/h'], ans:0, hint:'Average speed = Total distance ÷ Total time. Let distance = d each way.', exp:'Time A→B = d/12, B→A = d/8. Total time = d/12+d/8 = 5d/24. Avg = 2d÷(5d/24) = 48/5 = <strong>9.6 km/h</strong>' },
    { id:'m22', section:'Section B: Short Answer', tag:'short', difficulty:'hard', pool:'quiz', q:'A rectangular field is 3 times as long as it is wide. If its perimeter is 96 m, find its area.', opts:['432 m²','324 m²','512 m²','648 m²'], ans:0, hint:'Let width = w, length = 3w. Form equation using perimeter = 96.', exp:'2(w + 3w) = 96 → 8w = 96 → w = 12, L = 36. Area = 36 × 12 = <strong>432 m²</strong>' },
    { id:'m23', section:'Section C: Word Problems', tag:'word', difficulty:'hard', pool:'quiz', q:'3 men can build a wall in 8 days. How many days will it take 4 men (working at the same rate) to build 2 such walls?', opts:['12 days','6 days','16 days','8 days'], ans:0, hint:'Find total man-days for 1 wall first. Then for 2 walls with 4 men.', exp:'1 wall = 3×8 = 24 man-days. 2 walls = 48 man-days. With 4 men: 48÷4 = <strong>12 days</strong>' },
  ],

  science: [
    // ── Diversity (easy, drill) ──
    { id:'s01', section:'Diversity', tag:'diversity', difficulty:'easy', q:'Which characteristic is NOT shared by all living things?', opts:['Growth','Movement','Reproduction','Rusting'], ans:3, hint:'Rusting is a chemical reaction — is it a life process?', exp:'<strong>Rusting</strong> is not a life process. All living things grow, move (in some way), and reproduce.' },
    { id:'s02', section:'Diversity', tag:'diversity', difficulty:'easy', q:'Which adaptation helps a polar bear survive in the Arctic?', opts:['Thin skin','White camouflage fur and thick blubber','Long legs','Bright colours'], ans:1, hint:'Polar bears need warmth AND to blend in with snow', exp:'<strong>White fur for camouflage + thick blubber for insulation</strong> — two adaptations for cold, snowy conditions' },
    // ── Cycles (easy, drill) ──
    { id:'s03', section:'Cycles', tag:'cycles', difficulty:'easy', q:'In the water cycle, water vapour from plants enters the atmosphere through:', opts:['Evaporation','Precipitation','Transpiration','Condensation'], ans:2, hint:'This process is specific to plants releasing water through their leaves', exp:'<strong>Transpiration</strong> — plants release water vapour through stomata (tiny pores) in their leaves' },
    { id:'s04', section:'Cycles', tag:'cycles', difficulty:'easy', q:'During condensation in the water cycle, water:', opts:['Evaporates from the sea','Changes from vapour to liquid droplets','Falls as rain','Soaks into the ground'], ans:1, hint:'Think about a cold glass "sweating" on a hot day', exp:'<strong>Condensation</strong>: water vapour cools and changes back into liquid water droplets (forming clouds)' },
    // ── Systems (easy, drill) ──
    { id:'s05', section:'Systems', tag:'systems', difficulty:'easy', q:'Which blood vessels carry oxygenated blood AWAY from the heart?', opts:['Veins','Capillaries','Arteries','Lymph vessels'], ans:2, hint:'A = Away from heart (arteries). Think of the first letter.', exp:'<strong>Arteries</strong> carry oxygenated blood away from the heart; veins bring blood back to the heart' },
    { id:'s06', section:'Systems', tag:'systems', difficulty:'easy', q:'Where does most digestion and nutrient absorption occur?', opts:['Stomach','Liver','Large intestine','Small intestine'], ans:3, hint:'This organ has villi to increase surface area for absorption', exp:'<strong>Small intestine</strong> — villi (tiny projections) maximise surface area for nutrient absorption into bloodstream' },
    // ── Interactions (easy, drill) ──
    { id:'s07', section:'Interactions', tag:'interactions', difficulty:'easy', q:'What type of relationship is shown when a tick feeds on a dog\'s blood?', opts:['Mutualism','Commensalism','Parasitism','Predation'], ans:2, hint:'One organism benefits; the other is HARMED', exp:'<strong>Parasitism</strong> — tick (parasite) benefits; dog (host) is harmed' },
    { id:'s08', section:'Interactions', tag:'interactions', difficulty:'easy', q:'In a food chain: Grass → Grasshopper → Frog → Snake → Eagle. The grasshopper is a:', opts:['Producer','Primary consumer','Secondary consumer','Decomposer'], ans:1, hint:'Consumers are numbered by what they eat: first to eat the producer = ?', exp:'<strong>Primary consumer</strong> — the grasshopper eats the producer (grass) directly' },
    // ── Energy (easy, drill) ──
    { id:'s09', section:'Energy', tag:'energy', difficulty:'easy', q:'When you rub your hands together, what energy conversion occurs?', opts:['Chemical → Kinetic','Kinetic → Heat','Light → Heat','Potential → Kinetic'], ans:1, hint:'Moving hands = kinetic. They get warm = ?', exp:'<strong>Kinetic → Heat</strong> — friction from rubbing converts movement energy into heat energy' },
    { id:'s10', section:'Energy', tag:'energy', difficulty:'easy', q:'A ball at the top of a ramp has maximum:', opts:['Kinetic energy','Heat energy','Gravitational potential energy','Chemical energy'], ans:2, hint:'Energy stored due to HEIGHT/position', exp:'<strong>Gravitational potential energy</strong> — energy stored due to height. As it rolls down, this converts to kinetic energy.' },
    // ── Diversity extra (easy, drill) ──
    { id:'s23', section:'Diversity', tag:'diversity', difficulty:'easy', q:'Which of the following is a vertebrate?', opts:['Earthworm','Butterfly','Goldfish','Snail'], ans:2, hint:'Vertebrates have a backbone (spine)', exp:'<strong>Goldfish</strong> is a vertebrate — it has a backbone. Earthworms, butterflies, and snails are invertebrates.' },
    { id:'s24', section:'Diversity', tag:'diversity', difficulty:'easy', q:'What do plants need for photosynthesis?', opts:['Water and oxygen only','Carbon dioxide, water, and sunlight','Nitrogen and sunlight','Oxygen and glucose'], ans:1, hint:'Plants make food from gas in the air + water + energy from the sun', exp:'Plants need <strong>carbon dioxide + water + sunlight</strong> to make glucose and oxygen during photosynthesis' },
    { id:'s25', section:'Diversity', tag:'diversity', difficulty:'easy', q:'What is the main function of roots in a plant?', opts:['Make food through photosynthesis','Absorb water and minerals; anchor the plant','Produce seeds','Exchange gases'], ans:1, hint:'Think about what roots do underground', exp:'Roots <strong>absorb water and minerals</strong> from the soil and <strong>anchor the plant</strong> in the ground' },
    { id:'s26', section:'Diversity', tag:'diversity', difficulty:'easy', q:'Which organism is a producer in a food chain?', opts:['Lion','Grasshopper','Grass','Frog'], ans:2, hint:'Producers make their own food using sunlight', exp:'<strong>Grass</strong> is a producer — it makes its own food through photosynthesis. All other options are consumers.' },
    { id:'s27', section:'Diversity', tag:'diversity', difficulty:'easy', q:'A cactus has a thick stem and waxy skin. These adaptations help it:', opts:['Attract insects for pollination','Store water and reduce water loss in deserts','Grow taller in forests','Change colour in seasons'], ans:1, hint:'Cacti live in hot, dry deserts — what survival challenge do they face?', exp:'Thick stem <strong>stores water</strong>; waxy skin <strong>reduces water loss</strong> — adaptations for the dry desert environment' },
    { id:'s28', section:'Diversity', tag:'diversity', difficulty:'easy', q:'What is the difference between a mammal and a reptile?', opts:['Mammals lay eggs; reptiles give birth','Mammals are warm-blooded; reptiles are cold-blooded','Reptiles have fur; mammals have scales','Mammals live in water; reptiles live on land'], ans:1, hint:'Think about body temperature regulation', exp:'<strong>Mammals are warm-blooded</strong> (regulate own body temp); <strong>reptiles are cold-blooded</strong> (rely on environment for warmth)' },
    // ── Cycles extra (easy, drill) ──
    { id:'s29', section:'Cycles', tag:'cycles', difficulty:'easy', q:'What is evaporation in the water cycle?', opts:['Water falling as rain','Water vapour turning into clouds','Liquid water turning into water vapour due to heat','Water soaking into the ground'], ans:2, hint:'The sun heats water at the surface and it turns into...', exp:'<strong>Evaporation</strong>: liquid water absorbs heat energy and changes into water vapour, rising into the atmosphere' },
    { id:'s30', section:'Cycles', tag:'cycles', difficulty:'easy', q:'What is the main energy source that drives the water cycle?', opts:['Wind','The Sun','The Moon','The Earth\'s core'], ans:1, hint:'What heats the oceans and causes evaporation?', exp:'<strong>The Sun</strong> provides the heat energy that drives evaporation and powers the water cycle' },
    { id:'s31', section:'Cycles', tag:'cycles', difficulty:'easy', q:'Which term describes water falling from clouds as rain, snow, or hail?', opts:['Evaporation','Condensation','Transpiration','Precipitation'], ans:3, hint:'Think of rain, sleet, snow — water falling FROM the sky', exp:'<strong>Precipitation</strong> — water falls from clouds in various forms: rain, snow, sleet, or hail' },
    { id:'s32', section:'Cycles', tag:'cycles', difficulty:'easy', q:'A butterfly goes through: egg → larva (caterpillar) → pupa (chrysalis) → adult. This is called:', opts:['Incomplete metamorphosis','Complete metamorphosis','Germination','Pollination'], ans:1, hint:'4 distinct stages with a pupa stage = complete', exp:'<strong>Complete metamorphosis</strong> — 4 stages including the pupa (chrysalis) stage. Butterflies, beetles, and flies undergo this.' },
    { id:'s33', section:'Cycles', tag:'cycles', difficulty:'easy', q:'A grasshopper goes through: egg → nymph → adult (no pupa stage). This is called:', opts:['Complete metamorphosis','Incomplete metamorphosis','Germination','Binary fission'], ans:1, hint:'3 stages, no pupa = incomplete', exp:'<strong>Incomplete metamorphosis</strong> — 3 stages (egg, nymph, adult), no pupa stage. Grasshoppers, cockroaches undergo this.' },
    { id:'s34', section:'Cycles', tag:'cycles', difficulty:'easy', q:'In the carbon cycle, which process REMOVES carbon dioxide from the air?', opts:['Respiration','Combustion','Photosynthesis','Decomposition'], ans:2, hint:'Which process uses CO₂ as a raw material?', exp:'<strong>Photosynthesis</strong> removes CO₂ from the air — plants absorb it to make glucose. Respiration and combustion ADD CO₂.' },
    // ── Systems extra (easy, drill) ──
    { id:'s35', section:'Systems', tag:'systems', difficulty:'easy', q:'What is the function of the diaphragm?', opts:['Pump blood around the body','Contract and relax to help breathing','Digest food','Filter waste from blood'], ans:1, hint:'It is a dome-shaped muscle below the lungs', exp:'The <strong>diaphragm contracts and flattens</strong> when you breathe in (increasing chest volume), and relaxes when you breathe out' },
    { id:'s36', section:'Systems', tag:'systems', difficulty:'easy', q:'What is the main function of the stomach?', opts:['Absorb nutrients into blood','Store and release bile','Churn food and mix with acid to begin protein digestion','Filter waste from blood'], ans:2, hint:'Food goes to the stomach after being swallowed — what happens there?', exp:'The stomach <strong>churns food and mixes it with gastric acid</strong> to begin protein digestion, forming a liquid called chyme' },
    { id:'s37', section:'Systems', tag:'systems', difficulty:'easy', q:'Red blood cells carry:', opts:['Antibodies','Oxygen and carbon dioxide','Food nutrients only','Blood-clotting proteins'], ans:1, hint:'RBCs contain haemoglobin which binds to...', exp:'Red blood cells carry <strong>oxygen</strong> (from lungs to body) and <strong>carbon dioxide</strong> (from body back to lungs)' },
    { id:'s38', section:'Systems', tag:'systems', difficulty:'easy', q:'Which organ filters waste from the blood to produce urine?', opts:['Liver','Lungs','Kidneys','Stomach'], ans:2, hint:'This organ comes in a pair and is bean-shaped', exp:'The <strong>kidneys</strong> filter blood, removing waste products (like urea) which leave the body as urine' },
    { id:'s39', section:'Systems', tag:'systems', difficulty:'easy', q:'The human heart has how many chambers?', opts:['2','3','4','6'], ans:2, hint:'Two upper (atria) and two lower (ventricles)', exp:'The heart has <strong>4 chambers</strong>: right atrium, right ventricle, left atrium, left ventricle' },
    { id:'s40', section:'Systems', tag:'systems', difficulty:'easy', q:'What does the large intestine mainly absorb?', opts:['Proteins','Glucose','Water','Fats'], ans:2, hint:'By the time food reaches the large intestine, most nutrients are already absorbed', exp:'The <strong>large intestine absorbs water</strong> from undigested food, forming solid waste (faeces)' },
    // ── Interactions extra (easy, drill) ──
    { id:'s41', section:'Interactions', tag:'interactions', difficulty:'easy', q:'What is mutualism?', opts:['One benefits, one is harmed','Both organisms benefit','One benefits, the other is unaffected','One organism eats the other'], ans:1, hint:'Mutual = both benefit', exp:'<strong>Mutualism</strong>: both organisms benefit. Example: bees get nectar from flowers; flowers get pollinated by bees.' },
    { id:'s42', section:'Interactions', tag:'interactions', difficulty:'easy', q:'What are producers in an ecosystem?', opts:['Animals that hunt other animals','Organisms that break down dead matter','Organisms that make their own food through photosynthesis','Animals that eat plants'], ans:2, hint:'They produce food using sunlight — they are always plants or algae', exp:'<strong>Producers</strong> make their own food through photosynthesis. They form the base of every food chain.' },
    { id:'s43', section:'Interactions', tag:'interactions', difficulty:'easy', q:'What is the difference between a food chain and a food web?', opts:['They are the same thing','A food chain shows one path; a food web shows many interconnected paths','A food web is simpler than a food chain','A food chain includes decomposers; a food web does not'], ans:1, hint:'A web has many connections; a chain is just one line', exp:'A <strong>food chain</strong> shows one feeding path. A <strong>food web</strong> shows many interconnected food chains in an ecosystem.' },
    { id:'s44', section:'Interactions', tag:'interactions', difficulty:'easy', q:'In a food chain, which organism receives the MOST energy?', opts:['Top predator','Secondary consumer','Primary consumer','Producer'], ans:3, hint:'Energy is lost at each level — who is at the start?', exp:'<strong>Producers</strong> receive the most energy (directly from the sun). Energy is lost (~90%) at each level up the food chain.' },
    { id:'s45', section:'Interactions', tag:'interactions', difficulty:'easy', q:'What happens to a prey population when its predator population INCREASES?', opts:['Prey population increases','Prey population stays the same','Prey population decreases','Nothing changes'], ans:2, hint:'More predators = more hunting = ?', exp:'When predators <strong>increase</strong>, they eat more prey, so the <strong>prey population decreases</strong>' },
    { id:'s46', section:'Interactions', tag:'interactions', difficulty:'easy', q:'Cleaner fish eat parasites off larger fish. The large fish get cleaned. What type of relationship is this?', opts:['Parasitism','Predation','Mutualism','Commensalism'], ans:2, hint:'Both the cleaner fish AND the large fish benefit', exp:'<strong>Mutualism</strong>: cleaner fish gets food; large fish gets cleaned of parasites — both benefit' },
    // ── Energy extra (easy, drill) ──
    { id:'s47', section:'Energy', tag:'energy', difficulty:'easy', q:'What type of energy is stored in food?', opts:['Kinetic energy','Electrical energy','Chemical energy','Light energy'], ans:2, hint:'Food is a fuel — it stores energy in chemical bonds', exp:'Food stores <strong>chemical energy</strong>. When we digest food, this energy is released for our body to use.' },
    { id:'s48', section:'Energy', tag:'energy', difficulty:'easy', q:'A stretched rubber band has which type of stored energy?', opts:['Kinetic energy','Gravitational potential energy','Elastic potential energy','Chemical energy'], ans:2, hint:'It is stretched (deformed) and ready to spring back', exp:'A stretched rubber band has <strong>elastic potential energy</strong> — stored due to its deformed shape' },
    { id:'s49', section:'Energy', tag:'energy', difficulty:'easy', q:'A ringing bell produces which TWO forms of energy?', opts:['Light and heat','Sound and heat','Kinetic and light','Electrical and sound'], ans:1, hint:'You can hear it AND it gets warm from vibrating', exp:'A ringing bell produces <strong>sound energy</strong> (vibrations) and <strong>heat energy</strong> (from friction of vibrating metal)' },
    { id:'s50', section:'Energy', tag:'energy', difficulty:'easy', q:'Which energy conversion happens in a torch (flashlight)?', opts:['Chemical → Electrical → Light','Light → Chemical → Electrical','Heat → Light → Sound','Electrical → Chemical → Light'], ans:0, hint:'Battery → circuit → bulb', exp:'Battery stores <strong>chemical energy</strong> → converted to <strong>electrical energy</strong> → converted to <strong>light energy</strong> by the bulb' },
    { id:'s51', section:'Energy', tag:'energy', difficulty:'easy', q:'Which of the following is an example of light energy being converted to chemical energy?', opts:['A torch shining','A plant photosynthesising','An electric fan spinning','A battery charging a phone'], ans:1, hint:'Which process uses light to make a chemical (glucose)?', exp:'<strong>Photosynthesis</strong>: plants convert light energy into chemical energy stored in glucose' },
    { id:'s52', section:'Energy', tag:'energy', difficulty:'easy', q:'As a ball rolls down a ramp, what energy conversion takes place?', opts:['Kinetic → Potential','Potential → Kinetic','Chemical → Kinetic','Heat → Potential'], ans:1, hint:'Ball starts high (stored energy) and ends up moving fast (movement energy)', exp:'<strong>Gravitational potential energy → Kinetic energy</strong>: as the ball falls, stored height energy converts to movement energy' },
    // ── Medium / Quiz-only ──
    { id:'s11', section:'Systems', tag:'systems', difficulty:'medium', pool:'quiz', q:'A student covers a plant\'s leaves with petroleum jelly for 3 days, then tests a leaf for starch. Result is negative. What does this show?', opts:['Plants need water to make starch','Light cannot reach the leaves','Stomata are blocked, preventing gas exchange needed for photosynthesis','The plant was unhealthy'], ans:2, hint:'Petroleum jelly blocks the stomata. What do stomata allow in?', exp:'Stomata allow CO₂ in. Blocked stomata → no CO₂ → <strong>photosynthesis cannot occur</strong> → no starch produced' },
    { id:'s12', section:'Interactions', tag:'interactions', difficulty:'medium', pool:'quiz', q:'If all the frogs in an ecosystem are removed, what would most likely happen?', opts:['Grasshopper population decreases; snake population increases','Grasshopper population increases; snake population decreases','Nothing changes','All animals die'], ans:1, hint:'Think about what frogs eat and what eats frogs', exp:'No frogs → <strong>grasshoppers increase</strong> (no predator); <strong>snakes decrease</strong> (lose food source)' },
    { id:'s13', section:'Energy', tag:'energy', difficulty:'medium', pool:'quiz', q:'Which of the following is a non-renewable energy source?', opts:['Solar','Wind','Coal','Hydroelectric'], ans:2, hint:'Non-renewable = cannot be replenished within a human lifetime', exp:'<strong>Coal</strong> is a fossil fuel — it takes millions of years to form, so it is non-renewable' },
    { id:'s14', section:'Diversity', tag:'diversity', difficulty:'medium', pool:'quiz', q:'A fish has streamlined body, gills, and fins. Which function do gills serve?', opts:['Help the fish swim faster','Extract oxygen from water','Provide camouflage','Store energy'], ans:1, hint:'Gills are respiratory organs in fish', exp:'<strong>Gills extract dissolved oxygen from water</strong> — the equivalent of lungs for aquatic animals' },
    { id:'s15', section:'Cycles', tag:'cycles', difficulty:'medium', pool:'quiz', q:'During the carbon cycle, which process releases CO₂ into the atmosphere?', opts:['Photosynthesis','Respiration and combustion','Condensation','Nitrogen fixation'], ans:1, hint:'Which processes break down carbon compounds and release CO₂?', exp:'<strong>Respiration</strong> (in all living things) and <strong>combustion</strong> (burning) both release CO₂ into the atmosphere' },
    { id:'s16', section:'Systems', tag:'systems', difficulty:'medium', pool:'quiz', q:'What is the role of valves in the heart?', opts:['Pump blood to the body','Ensure blood flows in one direction','Exchange gases','Produce blood cells'], ans:1, hint:'Valves are like one-way doors', exp:'<strong>Valves ensure blood flows in one direction</strong> — preventing backflow between chambers and into vessels' },
    { id:'s17', section:'Energy', tag:'energy', difficulty:'medium', pool:'quiz', q:'A solar panel converts light energy into electrical energy. This is an example of:', opts:['Energy creation','Energy conservation','Energy conversion','Energy storage'], ans:2, hint:'Energy changing from one form to another = ?', exp:'<strong>Energy conversion</strong> — energy changes form (light → electrical) but is not created or destroyed' },
    { id:'s18', section:'Interactions', tag:'interactions', difficulty:'medium', pool:'quiz', q:'What is the role of decomposers in an ecosystem?', opts:['Produce food by photosynthesis','Break down dead matter and return nutrients to soil','Hunt and eat other animals','Compete with producers for sunlight'], ans:1, hint:'Fungi and bacteria are examples of decomposers', exp:'<strong>Decomposers</strong> break down dead organisms and waste, returning nutrients to the soil for producers to use' },
    // ── Hard / Quiz-only ──
    { id:'s19', section:'Systems', tag:'systems', difficulty:'hard', pool:'quiz', q:'Experiment: Plant A in light with open stomata; Plant B in dark with blocked stomata. Both tested for starch after 3 days. What is the independent variable?', opts:['Presence of starch','Amount of water given','Light and stomata condition','Type of plant'], ans:2, hint:'The independent variable is what the scientist deliberately CHANGES', exp:'The <strong>light and stomata condition</strong> is what is being changed/manipulated — it is the independent variable' },
    { id:'s20', section:'Energy', tag:'energy', difficulty:'hard', pool:'quiz', q:'Which statement about energy is correct?', opts:['Energy can be created from nothing','Energy is destroyed when converted','Total energy before and after conversion remains constant','Nuclear energy is a renewable resource'], ans:2, hint:'Law of Conservation of Energy', exp:'<strong>Law of Conservation of Energy</strong>: energy cannot be created or destroyed, only converted from one form to another' },
    { id:'s21', section:'Interactions', tag:'interactions', difficulty:'hard', pool:'quiz', q:'A scientist adds fertiliser to a lake. Algae multiply rapidly, blocking sunlight. Fish die. What is this process called, and what is the PRIMARY cause of fish death?', opts:['Photosynthesis; too much light','Eutrophication; lack of oxygen as bacteria decomposing dead algae use it up','Predation; algae eating fish','Osmosis; too much salt'], ans:1, hint:'When algae die, bacteria decompose them. What do bacteria need to respire?', exp:'<strong>Eutrophication</strong>: algae bloom → algae die → bacteria decompose dead algae → bacteria use up oxygen → fish suffocate' },
    { id:'s22', section:'Diversity', tag:'diversity', difficulty:'hard', pool:'quiz', q:'A mammal gives birth to live young, breathes air, but spends its entire life in water. Which of these is it MOST likely adapted for?', opts:['Running fast on land','Extracting oxygen from water using gills','Swimming efficiently and conserving body heat in cold water','Climbing trees'], ans:2, hint:'Think of a whale or dolphin — what adaptations help them survive in cold oceans?', exp:'<strong>Streamlined body for swimming + thick blubber for insulation</strong> — adaptations for an aquatic mammal in cold water' },
  ],

  malay: [
    // ── Tatabahasa (easy, drill) ──
    { id:'b01', section:'Tatabahasa', tag:'tatabahasa', difficulty:'easy', q:'Tukarkan kepada ayat pasif: "Ali memukul bola itu."', eng:'Change to passive: "Ali hit the ball."', opts:['Bola itu dipukul oleh Ali.','Bola itu memukul Ali.','Ali dipukul bola itu.','Dipukul bola itu oleh Ali.'], ans:0, hint:'Ayat pasif: Objek + kata kerja pasif (di-) + oleh + subjek', exp:'<strong>Bola itu dipukul oleh Ali.</strong> — objek jadi subjek, kata kerja "di-" ditambah' },

const LS = {
  get:(k,def)=>{ try{const v=localStorage.getItem(AF_PREFIX+k);return v?JSON.parse(v):def;}catch{return def;} },
  set:(k,v)=>{ try{localStorage.setItem(AF_PREFIX+k,JSON.stringify(v));}catch{} },
};

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function saveResult(subject, mode, score, total, breakdown, difficulty) {
  const all = LS.get('results',[]);
  all.push({ iso:new Date().toISOString(), date:new Date().toLocaleDateString('en-SG',{day:'numeric',month:'short'}), subject, mode, score, total, pct:Math.round((score/total)*100), breakdown, difficulty: difficulty || 'unknown' });
  LS.set('results', all);
}
function getResults(){ return LS.get('results',[]); }

function subjectStats(sub) {
  const rs = getResults().filter(r=>r.subject===sub);
  if (!rs.length) return null;
  const avg = Math.round(rs.reduce((a,b)=>a+b.pct,0)/rs.length);
  const best = Math.max(...rs.map(r=>r.pct));
  const quizRs = rs.filter(r=>r.mode==='quiz');
  const drillRs = rs.filter(r=>r.mode==='drill');
  const quizAvg = quizRs.length ? Math.round(quizRs.reduce((a,b)=>a+b.pct,0)/quizRs.length) : null;
  const drillAvg = drillRs.length ? Math.round(drillRs.reduce((a,b)=>a+b.pct,0)/drillRs.length) : null;
  const perfectDrills = rs.filter(r=>r.mode==='drill'&&r.pct===100).length;
  return { avg, best, count:rs.length, perfectDrills, quizAvg, drillAvg };
}

function getFirebaseUrl() {
  return (localStorage.getItem(AF_PREFIX + 'firebase_url') || '').trim();
}
async function syncToFirebase() {
  const url = getFirebaseUrl();
  if (!url) return;
  try {
    await fetch(url.replace(/\/$/, '') + '/af_data.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ results: getResults() })
    });
  } catch(e) { console.warn('Firebase sync failed', e); }
}
async function loadFromFirebase() {
  const url = getFirebaseUrl();
  if (!url) return false;
  try {
    const res = await fetch(url.replace(/\/$/, '') + '/af_data.json');
    const data = await res.json();
    if (!data) return false;
    if (data.results) LS.set('results', data.results);
    return true;
  } catch(e) { console.warn('Firebase load failed', e); return false; }
}

function Confetti() {
  const pieces = Array.from({length:30},(_,i)=>({ id:i, left:Math.random()*100, delay:Math.random()*1.2, color:['#f59e0b','#3b82f6','#10b981','#ec4899','#a855f7','#f97316'][i%6], size:8+Math.random()*8 }));
  return <>{pieces.map(p=><div key={p.id} className="confetti-piece" style={{left:`${p.left}%`,top:'-20px',background:p.color,width:`${p.size}px`,height:`${p.size}px`,animationDelay:`${p.delay}s`}} />)}</>;
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: QUIZ
// ═══════════════════════════════════════════════════════════════
function QuizScreen({ subject, onDone, onBack, difficulty }) {
  function filterDiff(qs) {
    if (!difficulty || difficulty==='easy') return qs.filter(q=>!q.difficulty||q.difficulty==='easy');
    if (difficulty==='medium') return qs.filter(q=>q.difficulty==='medium');
    return qs.filter(q=>q.difficulty==='hard');
  }

  const [questions] = useState(()=>{
    const sectionOrder = {
      english:['Grammar','Vocabulary','Grammar Cloze','Editing','Comprehension','Synthesis'],
      math:['Section A: MCQ','Section B: Short Answer','Section C: Word Problems'],
      science:['Diversity','Cycles','Systems','Interactions','Energy'],
      malay:['Tatabahasa','Kosa Kata','Kefahaman','Karangan'],
    }[subject] || [];

    const result = [];
    sectionOrder.forEach(sec=>{
      const sqs = QB[subject].filter(q=>(q.section||q.topic)===sec);
      const filtered = filterDiff(sqs);
      const pool = filtered.length>=2 ? filtered : sqs.filter(q=>!q.difficulty||q.difficulty==='easy');
      const n = subject==='math' ? (sec==='Section C: Word Problems'?5:8) : 7;
      shuffle(pool).slice(0,n).forEach(q=>result.push({...q, shuffledOpts:q.opts?shuffle(q.opts):[]}));
    });
    return result.length ? result : shuffle(QB[subject]).slice(0,40).map(q=>({...q,shuffledOpts:q.opts?shuffle(q.opts):[]}));
  });

  const [idx, setIdx] = useState(0);
  const [selected, setSel] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [showMalayEng, setShowMalayEng] = useState(false);
  const answersRef = useRef([]);
  const taughtSections = useRef(new Set());

  const firstKey = questions[0]?.section||questions[0]?.topic;
  const [showTeachFor, setShowTeachFor] = useState(()=>{
    if (firstKey && getTeachPanel(subject, firstKey)) return firstKey;
    return null;
  });

  const cfg = CFG[subject];
  const q = questions[idx];

  function dismissTeach() { taughtSections.current.add(showTeachFor); setShowTeachFor(null); }

  function pick(opt) {
    if (selected!==null) return;
    setSel(opt);
    answersRef.current = [...answersRef.current, { q, chosen:opt, correct: typeof q.ans==='number' ? q.opts[q.ans]===opt : opt===q.ans }];
  }

  function next() {
    if (idx+1>=questions.length) {
      const allA = answersRef.current;
      const score = allA.filter(a=>a.correct).length;
      const bd = {};
      allA.forEach(a=>{ const sec=a.q.section||a.q.topic||'General'; if(!bd[sec]) bd[sec]={correct:0,total:0}; bd[sec].total++; if(a.correct) bd[sec].correct++; });
      onDone(score, questions.length, bd);
    } else {
      const nextKey = questions[idx+1]?.section||questions[idx+1]?.topic;
      setIdx(i=>i+1); setSel(null); setShowHint(false); setShowMalayEng(false);
      if (nextKey && getTeachPanel(subject,nextKey) && !taughtSections.current.has(nextKey)) setShowTeachFor(nextKey);
    }
  }

  if (showTeachFor) {
    const t = getTeachPanel(subject, showTeachFor);
    if (t) return <TeachPanel t={t} onDone={dismissTeach} onHome={onBack} />;
  }

  const pct = (idx/questions.length)*100;
  const ansOpt = q && q.opts && typeof q.ans==='number' ? q.opts[q.ans] : q?.ans;
  const isCorrect = selected!==null && (selected===ansOpt);
  const diffLabel = difficulty && difficulty!=='easy' ? ` · ${difficulty==='medium'?'🟡':'🔴'} ${difficulty.charAt(0).toUpperCase()+difficulty.slice(1)}` : '';

  if (!q) return null;
  return (
    <div className="min-h-screen flex flex-col" style={{ backgroundColor:cfg.bg }}>
      <div className="p-4 flex items-center gap-3 text-white" style={{ backgroundColor:cfg.hdr }}>
        <button onClick={onBack} className="text-white/70 hover:text-white text-xl" title="Return to Home">🏠</button>
        <div className="flex-1">
          <div className="flex justify-between text-xs mb-1.5 text-white/80">
            <span>{cfg.emoji} {cfg.label}{diffLabel}</span>
            <span>Q{idx+1}/{questions.length}</span>
          </div>
          <div className="w-full bg-white/30 rounded-full h-2">
            <div className="bg-white h-2 rounded-full transition-all duration-500" style={{width:`${pct}%`}} />
          </div>
        </div>
      </div>

      <div className="flex-1 p-5 flex flex-col gap-4 max-w-lg mx-auto w-full pop">
        {(q.section||q.topic) && (
          <div className="inline-flex items-center text-xs font-semibold px-3 py-1 rounded-full w-fit text-white" style={{backgroundColor:cfg.hdr+'cc'}}>
            {q.section||q.topic}
          </div>
        )}
        {q.passage && (
          <div className="bg-white rounded-2xl p-4 shadow-sm border-l-4" style={{borderColor:cfg.hdr}}>
            <p className="text-xs text-gray-600 italic leading-relaxed">{q.passage}</p>
          </div>
        )}
        <div className="bg-white rounded-2xl p-5 shadow-sm">
          <p className="text-base font-semibold text-gray-800 leading-relaxed">{q.q}</p>
        </div>

        <div className="flex flex-col gap-3">
          {q.opts && q.shuffledOpts.map((opt,i)=>{
            let cls = 'bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-400 cursor-pointer';
            if (selected!==null) {
              if (opt===ansOpt) cls='bg-green-50 border-2 border-green-500 text-green-800';
              else if (opt===selected) cls='bg-red-50 border-2 border-red-400 text-red-700';
              else cls='bg-white border-2 border-gray-200 text-gray-400 opacity-50';
            }
            return (
              <button key={i} onClick={()=>pick(opt)} className={`${cls} rounded-xl p-4 text-left font-medium transition-all text-sm`}>
                <span className="text-gray-400 mr-2 font-normal">{['A','B','C','D'][i]}.</span>{opt}
              </button>
            );
          })}
        </div>

        {selected!==null && (
          <div className={`rounded-xl p-4 pop ${isCorrect?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`}>
            <p className="font-semibold mb-1 text-sm">{isCorrect?'✅ Correct!':`❌ Answer: ${ansOpt}`}</p>
            {q.exp && <p className="text-xs text-gray-600" dangerouslySetInnerHTML={{__html:q.exp}} />}
          </div>
        )}

        {selected===null && q.hint && (
          <button onClick={()=>setShowHint(!showHint)} className="text-xs text-blue-600 hover:text-blue-700 font-semibold">
            {showHint?'💡 Hide hint':'💡 Show hint'}
          </button>
        )}
        {showHint && q.hint && (
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
            <p className="text-xs text-blue-800">{q.hint}</p>
          </div>
        )}

        {subject==='malay' && q.eng && selected===null && (
          <button onClick={()=>setShowMalayEng(!showMalayEng)} className="text-xs text-orange-500 hover:text-orange-600 font-semibold mt-1">
            {showMalayEng?'🇬🇧 Hide English':'🇬🇧 Reveal English'}
          </button>
        )}
        {showMalayEng && subject==='malay' && q.eng && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3">
            <p className="text-xs text-amber-800">🇬🇧 {q.eng}</p>
          </div>
        )}

        {selected!==null && (
          <button onClick={next} className={`${cfg.btn} text-white font-bold py-3 rounded-xl transition-all pop`}>
            {idx+1>=questions.length?'See Results 🎉':'Next →'}
          </button>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: DRILL
// ═══════════════════════════════════════════════════════════════
function DrillScreen({ subject, topic, onDone, onBack, onHome }) {
  const [questions] = useState(()=>{
    const filtered = QB[subject].filter(q=>(q.section||q.topic)===topic && (!q.pool||q.pool!=='quiz'));
    const pool = filtered.length ? filtered : QB[subject].filter(q=>(q.section||q.topic)===topic);
    return shuffle(pool).slice(0,10).map(q=>({...q,shuffledOpts:q.opts?shuffle(q.opts):[]}));
  });
  const [queue, setQueue] = useState([...Array(Math.min(10,questions.length)).keys()]);
  const [idx, setIdx] = useState(0);
  const [selected, setSel] = useState(null);
  const cfg = CFG[subject];
  const q = questions[queue[idx]];

  function pick(opt) {
    if (selected!==null) return;
    setSel(opt);
    const ansOpt = typeof q.ans==='number' ? q.opts[q.ans] : q.ans;
    const isCorrect = opt===ansOpt;
    if (!isCorrect) {
      const newQ = [...queue.slice(1), queue[idx]];
      setTimeout(()=>{ setQueue(newQ); setIdx(0); setSel(null); }, 1200);
    }
  }

  function next() {
    if (queue.length===1) { onDone(true); return; }
    const newQ = queue.slice(1);
    setQueue(newQ); setIdx(0); setSel(null);
  }

  if (!q) return <div className="min-h-screen flex items-center justify-center text-gray-500">No questions available for this topic.</div>;

  const total = Math.min(10, questions.length);
  const correct = total - queue.length;
  const pct = (correct/total)*100;
  const ansOpt = typeof q.ans==='number' ? q.opts[q.ans] : q.ans;
  const isRight = selected!==null && selected===ansOpt;

  return (
    <div className="min-h-screen flex flex-col" style={{ backgroundColor:cfg.bg }}>
      <div className="p-4 flex items-center gap-3 text-white" style={{ backgroundColor:cfg.hdr }}>
        <button onClick={onHome||onBack} className="text-white/70 hover:text-white text-xl" title="Return to Home">🏠</button>
        <div className="flex-1">
          <div className="flex justify-between text-xs mb-1.5 text-white/80">
            <span>{cfg.emoji} Drill: {topic}</span>
            <span>{correct}/{total} correct</span>
          </div>
          <div className="w-full bg-white/30 rounded-full h-2">
            <div className="bg-white h-2 rounded-full transition-all duration-500" style={{width:`${pct}%`}} />
          </div>
        </div>
      </div>

      <div className="flex-1 p-5 flex flex-col gap-4 max-w-lg mx-auto w-full pop">
        <div className="inline-flex text-xs font-semibold px-3 py-1 rounded-full w-fit text-white" style={{backgroundColor:cfg.hdr+'cc'}}>
          {correct}/{total} Correct
        </div>
        {q.passage && (
          <div className="bg-white rounded-2xl p-4 shadow-sm border-l-4" style={{borderColor:cfg.hdr}}>
            <p className="text-xs text-gray-600 italic leading-relaxed">{q.passage}</p>
          </div>
        )}
        <div className="bg-white rounded-2xl p-5 shadow-sm">
          <p className="text-base font-semibold text-gray-800 leading-relaxed">{q.q}</p>
        </div>

        <div className="flex flex-col gap-3">
          {q.shuffledOpts.map((opt,i)=>{
            let cls='bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-400 cursor-pointer';
            if (selected!==null) {
              if (opt===ansOpt) cls='bg-green-50 border-2 border-green-500 text-green-800';
              else if (opt===selected) cls='bg-red-50 border-2 border-red-400 text-red-700';
              else cls='bg-white border-2 border-gray-200 text-gray-400 opacity-50';
            }
            return (
              <button key={i} onClick={()=>pick(opt)} className={`${cls} rounded-xl p-4 text-left font-medium transition-all text-sm`}>
                <span className="text-gray-400 mr-2 font-normal">{['A','B','C','D'][i]}.</span>{opt}
              </button>
            );
          })}
        </div>

        {selected!==null && (
          <div className={`rounded-xl p-4 pop ${isRight?'bg-green-50 border border-green-200':'bg-red-50 border border-red-200'}`}>
            <p className="font-semibold mb-1 text-sm">{isRight?'✅ Correct!':isRight===false&&!isRight?`❌ Answer: ${ansOpt}`:''}</p>
            {!isRight && <p className="font-semibold mb-1 text-sm text-red-700">❌ Answer: {ansOpt}</p>}
            {q.exp && <p className="text-xs text-gray-600" dangerouslySetInnerHTML={{__html:q.exp}} />}
            {!isRight && <p className="text-xs text-orange-600 mt-1">Moving to end of queue — try again!</p>}
          </div>
        )}

        {selected!==null && isRight && (
          <button onClick={next} className={`${cfg.btn} text-white font-bold py-3 rounded-xl transition-all pop`}>
            {queue.length===1?'✅ Complete!':'Continue →'}
          </button>
        )}
      </div>
    </div>
  );
}
